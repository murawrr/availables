<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Episodes - Mura Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Language Toggle -->
    <div class="lang-toggle">
        <button onclick="setLanguage('en')" class="lang-btn active" data-lang="en">EN</button>
        <button onclick="setLanguage('ko')" class="lang-btn" data-lang="ko">KO</button>
        <button onclick="setLanguage('jp')" class="lang-btn" data-lang="jp">JP</button>
    </div>

    <div class="container">
        <!-- Back Button -->
        <a href="index.html" class="back-btn" data-en="← Back" data-ko="← 뒤로" data-jp="← 戻る">← Back</a>

        <!-- Header -->
        <header class="header">
            <h1 data-en="Episodes" data-ko="에피소드" data-jp="エピソード">Episodes</h1>
        </header>

        <!-- Episodes Grid -->
        <div class="episodes-grid">
            <a href="episode-1.html" class="episode-card">
                <h3 data-en="Episode 1" data-ko="에피소드 1" data-jp="エピソード 1">Episode 1</h3>
            </a>
            <a href="episode-2.html" class="episode-card">
                <h3 data-en="Episode 2" data-ko="에피소드 2" data-jp="エピソード 2">Episode 2</h3>
            </a>
            <a href="episode-3.html" class="episode-card">
                <h3 data-en="Episode 3" data-ko="에피소드 3" data-jp="エピソード 3">Episode 3</h3>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
